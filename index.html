<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }
        h2 { color: var(--tg-theme-text-color); margin-bottom: 15px; }
        .card {
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px; padding: 15px; margin-bottom: 15px;
            width: 100%; max-width: 400px; box-sizing: border-box;
        }
        h3 { margin-top: 0; font-size: 14px; color: var(--tg-theme-hint-color); text-transform: uppercase; }
        input {
            width: 100%; padding: 10px; margin-bottom: 10px;
            border: 1px solid var(--tg-theme-hint-color); border-radius: 6px;
            background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color);
            box-sizing: border-box;
        }
        .btn {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none; border-radius: 8px; padding: 12px;
            font-size: 15px; font-weight: bold; width: 100%;
            cursor: pointer; margin-bottom: 5px;
        }
        .btn-danger { background-color: #ff3b30; }
    </style>
</head>
<body>
    <h2>Control Panel</h2>

    <div class="card">
        <h3>Save Quick Note</h3>
        <input type="text" id="noteInput" placeholder="Type note here...">
        <button class="btn" onclick="sendCommand('note')">Save to Database</button>
    </div>

    <div class="card">
        <h3>Weather Radar</h3>
        <input type="text" id="weatherInput" placeholder="City (Default: Dharashiv)">
        <button class="btn" onclick="sendCommand('weather')">Check Weather</button>
    </div>

    <div class="card">
        <h3>Master PC Control</h3>
        <button class="btn btn-danger" onclick="sendCommand('pc_sleep')">Sleep PC</button>
        <button class="btn btn-danger" onclick="sendCommand('pc_lock')">Lock PC</button>
    </div>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        // This function builds the command string and sends it to Python
        function sendCommand(action) {
            let cmdString = "";

            if (action === 'note') {
                let note = document.getElementById('noteInput').value;
                if (!note) return Telegram.WebApp.showAlert("Note cannot be empty!");
                cmdString = "/note " + note;
            } 
            else if (action === 'weather') {
                let city = document.getElementById('weatherInput').value;
                cmdString = "/weather " + city; // Python handles empty strings gracefully
            } 
            else if (action === 'pc_sleep') {
                cmdString = "/pc sleep";
            } 
            else if (action === 'pc_lock') {
                cmdString = "/pc lock";
            }

            // Send data to Python and close the UI
            Telegram.WebApp.sendData(cmdString);
        }
    </script>
</body>
</html>
