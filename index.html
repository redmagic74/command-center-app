<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Command Center</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Using Telegram's native color variables for perfect dark/light mode syncing */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: var(--tg-theme-text-color);
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .card {
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card h3 {
            margin-top: 0;
            color: var(--tg-theme-hint-color, #999999);
            font-size: 14px;
            text-transform: uppercase;
        }
        .btn {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        .btn:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <h1>Command Center</h1>
    
    <div class="card">
        <h3>Status Report</h3>
        <p>Welcome, Architect. All local systems and AI cores are online.</p>
        <button class="btn" onclick="Telegram.WebApp.showAlert('Diagnostic complete. Network Vault is secure. API latency is 12ms.')">Run Diagnostic</button>
    </div>

    <div class="card">
        <h3>Session Control</h3>
        <button class="btn" onclick="Telegram.WebApp.close()" style="background-color: var(--tg-theme-destructive-text-color, #ff3b30);">Close Interface</button>
    </div>

    <script>
        // Tell Telegram the app is fully loaded and ready to display
        Telegram.WebApp.ready();
        // Force the app to expand to full screen height
        Telegram.WebApp.expand();
    </script>
</body>
</html>
